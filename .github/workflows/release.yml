name: Build Evident Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifact
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/evident-gui.exe artifact/evident-gui-windows-x64.exe
            cp target/${{ matrix.target }}/release/evident-ledger.exe artifact/evident-ledger-windows-x64.exe
            cp target/${{ matrix.target }}/release/evident-verify.exe artifact/evident-verify-windows-x64.exe
            cp target/${{ matrix.target }}/release/evident.exe artifact/evident-windows-x64.exe
          else
            cp target/${{ matrix.target }}/release/evident-gui artifact/evident-gui-${{ matrix.target }}
            cp target/${{ matrix.target }}/release/evident-ledger artifact/evident-ledger-${{ matrix.target }}
            cp target/${{ matrix.target }}/release/evident-verify artifact/evident-verify-${{ matrix.target }}
            cp target/${{ matrix.target }}/release/evident artifact/evident-${{ matrix.target }}
          fi

      - name: Checksums
        shell: bash
        run: cd artifact && sha256sum * > SHA256SUMS

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
