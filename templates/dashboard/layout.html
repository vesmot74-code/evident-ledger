<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %} — Evident Ledger</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #f4f6f9;
      --bg-card: #ffffff;
      --text: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --accent: #3652f6;
      --accent-soft: #eef2ff;
      --danger: #b91c1c;
      --font-main: 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', Menlo, monospace;
      --radius: 10px;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .shell { max-width: 960px; margin: 0 auto; padding: 28px 24px 48px; }
    .header {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; }
    .header h1 a { color: var(--text); text-decoration: none; }
    .header h1 a:hover { color: var(--accent); text-decoration: none; }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .header-meta .plan-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .nav {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .nav a {
      color: var(--text-secondary);
      font-size: 0.92rem;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .nav a:hover { background: var(--bg); text-decoration: none; color: var(--text); }
    .nav a.active {
      color: var(--text);
      font-weight: 600;
      background: var(--bg);
      text-decoration: none;
    }
    .nav-logout { margin-left: auto; }
    .onboarding {
      border: 1px solid #bfdbfe;
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
      border-radius: var(--radius);
      padding: 22px 22px 18px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .onboarding h2 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      text-transform: none;
      color: var(--text);
    }
    .onboarding .lead {
      color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .onboarding ol {
      margin: 0 0 16px 1.2rem;
      color: var(--text);
    }
    .onboarding li { margin-bottom: 6px; }
    .onboarding .card-actions { margin-top: 0; }
    .page-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .page-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      background: var(--bg-card);
      box-shadow: var(--shadow);
    }
    .card h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-weight: 700;
    }
    .card .value { font-size: 1.08rem; font-weight: 600; }
    .card .muted { margin-top: 6px; color: var(--text-secondary); font-size: 0.9rem; }
    .card-actions { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .section-stack { display: flex; flex-direction: column; gap: 16px; }
    .upgrade-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }
    .upgrade-row:first-of-type { border-top: none; padding-top: 0; }
    table { width: 100%; border-collapse: collapse; background: var(--bg-card); }
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-card);
      box-shadow: var(--shadow);
    }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    th { color: var(--text-secondary); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; background: #f8fafc; }
    code { font-family: var(--font-mono); background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
    .btn {
      display: inline-block;
      border: 1px solid var(--border);
      background: var(--bg-card);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.92rem;
      color: var(--text);
    }
    .btn:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.6; cursor: wait; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .btn-primary:hover { filter: brightness(0.96); border-color: var(--accent); }
    .btn-danger { color: var(--danger); }
    .alert { border: 1px solid #bfdbfe; background: #eff6ff; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    .alert p { margin-top: 8px; color: var(--text-secondary); font-size: 0.9rem; }
    .error { color: var(--danger); font-size: 0.9rem; margin-top: 8px; min-height: 1.2em; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; background: var(--bg); }
    .badge-active { background: #dcfce7; color: #166534; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="header-top">
        <h1><a href="/">Evident Ledger</a></h1>
        <div class="header-meta">
          {% block header_meta %}{% endblock %}
          <form class="nav-logout" method="post" action="/auth/logout">
            <button class="btn" type="submit">Logout</button>
          </form>
        </div>
      </div>
      <nav class="nav" aria-label="Dashboard">
        <a href="/">Evident Ledger</a>
        <a href="/dashboard/ui" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
        <a href="/whitepaper">Docs</a>
        <a href="https://github.com/vesmot74-code/evident-ledger/releases/latest">Download CLI</a>
        <a href="/#tiers">Pricing</a>
        <a href="/dashboard/ui" class="{% block nav_account %}{% endblock %}">Account</a>
        <a href="/dashboard/ui/subscription" class="{% block nav_subscription %}{% endblock %}">Subscription</a>
        <a href="/dashboard/identity" class="{% block nav_identity %}{% endblock %}">Identity</a>
        <a href="/dashboard/ui/api-keys" class="{% block nav_api_keys %}{% endblock %}">API Keys</a>
        <a href="/dashboard/ui/usage" class="{% block nav_usage %}{% endblock %}">Usage</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
  window.EvidentPaddle = (function () {
    var state = 'idle';
    var waiters = [];

    function settle(ok) {
      state = ok ? 'ready' : 'unavailable';
      while (waiters.length) {
        waiters.shift()(ok);
      }
    }

    function whenReady() {
      if (state === 'ready') return Promise.resolve(true);
      if (state === 'unavailable') return Promise.resolve(false);
      return new Promise(function (resolve) { waiters.push(resolve); });
    }

    function initialize() {
      var tokenMeta = document.querySelector('meta[name="paddle-client-token"]');
      var token = tokenMeta && tokenMeta.content;
      if (!token || !window.Paddle) {
        settle(false);
        return;
      }
      try {
        var envMeta = document.querySelector('meta[name="paddle-environment"]');
        var env = envMeta && envMeta.content;
        if (env === 'sandbox' && Paddle.Environment && Paddle.Environment.set) {
          Paddle.Environment.set('sandbox');
        }
        var init = Paddle.Initialize || Paddle.Setup;
        init.call(Paddle, {
          token: token,
          eventCallback: function (data) {
            if (data && data.name === 'checkout.completed') {
              window.location.href = '/dashboard/ui';
            }
          }
        });
        settle(true);
        var ptxn = new URLSearchParams(window.location.search).get('_ptxn');
        if (ptxn) {
          openCheckout(ptxn, null);
        }
      } catch (err) {
        if (typeof console !== 'undefined' && console.error) {
          console.error('Paddle initialization failed', err);
        }
        settle(false);
      }
    }

    function start() {
      if (state !== 'idle') return;
      var tokenMeta = document.querySelector('meta[name="paddle-client-token"]');
      if (!tokenMeta || !tokenMeta.content) {
        settle(false);
        return;
      }
      state = 'loading';
      if (window.Paddle) {
        initialize();
        return;
      }
      var script = document.querySelector('script[data-paddle-sdk]');
      if (!script) {
        settle(false);
        return;
      }
      script.addEventListener('load', initialize);
      script.addEventListener('error', function () { settle(false); });
      if (window.Paddle) {
        initialize();
      }
    }

    function openCheckout(transactionId, checkoutUrl) {
      return whenReady().then(function (ok) {
        if (ok && window.Paddle && transactionId) {
          Paddle.Checkout.open({ transactionId: transactionId });
          return true;
        }
        if (checkoutUrl) {
          window.location.href = checkoutUrl;
          return true;
        }
        return false;
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', start);
    } else {
      start();
    }

    return { whenReady: whenReady, openCheckout: openCheckout };
  })();
  </script>
  {% block body_scripts %}{% endblock %}
</body>
</html>
