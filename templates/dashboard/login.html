<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Evident Ledger</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f5f7fb;
      --text: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --accent: #3652f6;
      --font-main: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-main); color: var(--text); background: var(--bg-alt); min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { width: 100%; max-width: 420px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 14px; font-size: 1rem; }
    button { width: 100%; padding: 10px 12px; border: none; border-radius: 6px; background: var(--accent); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { filter: brightness(0.95); }
    .error { color: #b91c1c; margin-top: 12px; font-size: 0.9rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Evident Ledger</h1>
    <p>Sign in to your dashboard</p>
    <form id="login-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
    <div id="login-error" class="error" aria-live="polite"></div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = '';

      const response = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email, password }),
      });

      if (response.ok) {
        window.location.href = '/dashboard';
        return;
      }

      let message = 'Invalid email or password';
      try {
        const body = await response.json();
        if (body && body.error && body.error.message) {
          message = body.error.message;
        }
      } catch (_) {}
      errorEl.textContent = message;
    });
  </script>
</body>
</html>
